<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

    <style>
        :root {
            --input-bg: var(--vscode-input-background, #2c2c2c);
            --border-color: var(--vscode-widget-border, #444);
            --text-color: var(--vscode-foreground, #cccccc);
        }
        body { font-family: var(--vscode-font-family); background-color: var(--vscode-editor-background); color: var(--text-color); margin: 0; height: 100vh; display: flex; flex-direction: column; }
        
        #messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
        .msg { padding: 8px 12px; border-radius: 6px; font-size: 13px; line-height: 1.6; }
        .msg.user { align-self: flex-end; background: var(--vscode-button-background); color: white; }
        .msg.ai { align-self: flex-start; background: var(--vscode-sideBar-background); border: 1px solid var(--border-color); width: 90%; }
        
        /* Styling untuk Markdown */
        pre { background: #1e1e1e; padding: 10px; border-radius: 4px; overflow-x: auto; }
        code { font-family: 'Consolas', monospace; }

        #composer { padding: 12px; border-top: 1px solid var(--border-color); background: var(--vscode-editor-background); }
        textarea { width: 100%; min-height: 80px; padding: 10px; box-sizing: border-box; background: var(--input-bg); border: 1px solid var(--border-color); color: white; border-radius: 6px; resize: none; }
        button { background: var(--vscode-button-background); color: white; border: none; padding: 6px 14px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; gap: 6px; margin-top: 8px; }
    </style>
</head>
<body>

    <div id="messages"></div>

    <div id="composer">
        <textarea id="userInput" placeholder="Tanyakan sesuatu pada Zecur..."></textarea>
        <button id="sendBtn">Kirim</button>
    </div>

    <script>
        const vscode = acquireVsCodeApi();
        const messages = document.getElementById('messages');
        const input = document.getElementById('userInput');

        // Fungsi render pesan
        function appendMessage(text, isUser) {
            const div = document.createElement('div');
            div.className = `msg ${isUser ? 'user' : 'ai'}`;
            
            if (isUser) {
                div.textContent = text;
            } else {
                // Konversi Markdown ke HTML
                div.innerHTML = marked.parse(text);
                // Highlight kode
                div.querySelectorAll('pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            }
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        document.getElementById('sendBtn').onclick = () => {
            const text = input.value.trim();
            if (!text) return;
            vscode.postMessage({ command: 'runTask', text: text });
            appendMessage(text, true);
            input.value = '';
        };

        window.addEventListener('message', event => {
            if (event.data.command === 'aiResponse') {
                appendMessage(event.data.text, false);
            }
        });
    </script>
</body>
</html>
